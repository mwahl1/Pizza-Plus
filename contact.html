<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pizza Plus - Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <header>
        <h1>Pizza Plus</h1>
        <h2>Contact Us</h2>
    </header>

    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="specials.html">Specials</a>
        <a href="order.html">Order</a>
        <a href="catering.html">Catering</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
    </nav>

    <main>
        <section class="card">
            <h3>Call Us</h3>
            <p><a href="tel:555-123-4567">555-123-4567</a></p>
        </section>

        <section class="card">
            <h3>Send Us a Message</h3>
            <form class="contact-form" novalidate>
                <label for="name">Name</label>
                <input id="name" type="text" name="name" placeholder="Your name" required>

                <label for="email">Email</label>
                <input id="email" type="email" name="email" placeholder="you@example.com" required>

                <label for="phone">Phone</label>
                <input id="phone" type="tel" name="phone" placeholder="555-123-4567" required>

                <label for="reason">Reason for contacting</label>
                <select id="reason" name="reason" required>
                    <option>Order Question</option>
                    <option>Catering</option>
                    <option>Feedback</option>
                    <option>Other</option>
                </select>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Type your message here (at least 10 characters)" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Pizza Plus</p>
    </footer>
</body>
</html>
